<!DOCTYPE html>
<html>
<head><title>Generate GKI Icons</title></head>
<body style="background:#222;color:#fff;font-family:sans-serif;padding:2rem">
<h2>GKI Icon Generator</h2>
<p>Click each button to download the PNG icon file. Then place them in public/ folder.</p>
<canvas id="c192" width="192" height="192" style="border:1px solid #555"></canvas>
<canvas id="c512" width="512" height="512" style="border:1px solid #555"></canvas>
<canvas id="cMask" width="512" height="512" style="border:1px solid #555"></canvas>
<br><br>
<button onclick="dl('c192','icon-192.png')">Download 192x192</button>
<button onclick="dl('c512','icon-512.png')">Download 512x512</button>
<button onclick="dl('cMask','icon-maskable-512.png')">Download Maskable 512x512</button>

<script>
function draw(canvasId, size, maskable){
  const c = document.getElementById(canvasId);
  const ctx = c.getContext('2d');
  // Black background
  ctx.fillStyle = '#000';
  ctx.fillRect(0,0,size,size);
  // White bold text "GKI"
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const fontSize = maskable ? Math.floor(size * 0.32) : Math.floor(size * 0.4);
  ctx.font = `800 ${fontSize}px Inter, Arial, Helvetica, sans-serif`;
  ctx.fillText('GKI', size/2, size * (maskable ? 0.52 : 0.52));
}

draw('c192', 192, false);
draw('c512', 512, false);
draw('cMask', 512, true);

function dl(canvasId, filename){
  const c = document.getElementById(canvasId);
  const link = document.createElement('a');
  link.download = filename;
  link.href = c.toDataURL('image/png');
  link.click();
}
</script>
</body>
</html>
